<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Altalune — A Universe in Your Pocket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-deep-blue: #050b1a;
      --bg-deep-blue-soft: #0b1224;
      --metal-gold: #f4c46a;
      --metal-gold-deep: #c48b32;
      --text-gold: #f7d48a;
      --text-soft-gold: #f0e0b8;
      --text-white: #f5f7ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b2640 0%, #050b1a 55%, #02040a 100%);
      color: var(--text-soft-gold);
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
    }

    .content {
      max-width: 720px;
      width: 100%;
    }

    /* BANNER IMAGE HERO */
    .hero {
      padding: 0;
      margin-bottom: 2.5rem;
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.8),
        0 0 80px rgba(10, 20, 60, 0.9);
      border: 1px solid rgba(244, 196, 106, 0.25);
    }

    .hero img {
      width: 100%;
      display: block;
    }

    /* SECTION BASE */
    .section {
      background: linear-gradient(
        to bottom,
        rgba(11, 18, 36, 0.95),
        rgba(5, 11, 26, 0.98)
      );
      border-radius: 18px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1.75rem;
      border: 1px solid rgba(244, 196, 106, 0.18);
      box-shadow:
        0 0 24px rgba(0, 0, 0, 0.85),
        0 0 40px rgba(10, 20, 60, 0.75);
    }

    .section p {
      margin-bottom: 0.9rem;
      font-size: 0.98rem;
      color: var(--text-soft-gold);
    }

    .section p:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--metal-gold);
      margin-bottom: 0.75rem;
      text-shadow:
        0 0 10px rgba(0, 0, 0, 0.9),
        0 0 18px rgba(244, 196, 106, 0.4);
    }

    .section-strong {
      font-weight: 600;
      color: var(--text-gold);
    }

    /* METALLIC DIVIDER */
    .divider {
      display: flex;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .divider-line {
      height: 3px;
      width: 60%;
      max-width: 420px;
      background:
        linear-gradient(
          to right,
          transparent 0%,
          #7a4b16 12%,
          #c48b32 28%,
